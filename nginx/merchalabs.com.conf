server {
    server_name merchalabs.com www.merchalabs.com;

    root /var/www/merchalabs.com;
    index index.html;

    # Marketing site — static Next.js export
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Shopify App Proxy → Restock Alerts app server (port 3012)
    # Must come before location / to take priority
    location ^~ /restock-alerts/api/ {
        proxy_pass         http://localhost:3012/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Shopify admin app + OAuth + webhooks
    location ~* ^/(app|api|auth|webhooks) {
        proxy_pass         http://localhost:3012;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Long-lived cache for versioned Next.js assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Security headers
    # X-Frame-Options intentionally omitted — Shopify embedded app runs in an
    # iframe; frame-ancestors is handled by the app's CSP headers via boundary.headers()
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/merchalabs.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/merchalabs.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.merchalabs.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = merchalabs.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name merchalabs.com www.merchalabs.com;
    return 404; # managed by Certbot
}
