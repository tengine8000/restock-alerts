# /etc/nginx/sites-available/merchalabs.com
# Copy this file to the server, then:
#   sudo ln -s /etc/nginx/sites-available/merchalabs.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Certbot will append the HTTPS server block automatically when you run:
#   sudo certbot --nginx -d merchalabs.com -d www.merchalabs.com

server {
    listen 80;
    server_name merchalabs.com www.merchalabs.com;

    root /var/www/merchalabs.com;
    index index.html;

    # ── Shopify App Proxy ────────────────────────────────────────────────────
    # Rewrites /restock-alerts/api/* → /api/* on the Node app (port 3012)
    # Must be defined before location / to take priority
    location ^~ /restock-alerts/api/ {
        proxy_pass         http://localhost:3012/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Shopify admin app + OAuth + webhooks ─────────────────────────────────
    # Covers: /app/* /api/* /auth/* /webhooks/*
    # Note: X-Frame-Options is intentionally absent here — Shopify's embedded
    # app runs in an iframe and the app boundary middleware sets frame-ancestors.
    location ~* ^/(app|api|auth|webhooks) {
        proxy_pass         http://localhost:3012;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Marketing site — static Next.js export ───────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Long-lived cache for versioned Next.js assets ────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    # X-Frame-Options is intentionally omitted — would break the Shopify
    # embedded app iframe. frame-ancestors is handled by the app's CSP headers.
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
}
