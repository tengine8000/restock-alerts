# Restock Alerts — Nginx proxy block reference
# This shows the blocks that must be added to the merchalabs.com server config.
# See nginx/merchalabs.com.conf for the complete ready-to-deploy file.

# Shopify App Proxy — rewrites /restock-alerts/api/* → /api/* on port 3012
# Must come before location / to take priority
location ^~ /restock-alerts/api/ {
    proxy_pass         http://localhost:3012/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}

# Shopify admin app + OAuth + webhooks
location ~* ^/(app|api|auth|webhooks) {
    proxy_pass         http://localhost:3012;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        'upgrade';
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}
