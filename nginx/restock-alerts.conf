# Shopify app — proxy dynamic routes to Node on port 3000
# Add this block ABOVE the existing `location /` static files block
# inside the merchalabs.com server {} block in /etc/nginx/sites-available/merchalabs.com

location ~* ^/(app|api|auth|webhooks|restock-alerts) {
    proxy_pass http://localhost:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_cache_bypass $http_upgrade;
}
